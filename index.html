<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Kapellen 1919 - Kader</title>
    <style>
        :root {
            --bg-dark: #0f172a; 
            --card-bg: #111827; 
            --card-inner-bg: #151f32; 
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-orange: #f59e0b;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 2.5rem 1.5rem;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        header h1 {
            font-size: 2.8rem;
            letter-spacing: 2px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--accent-green);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        /* HIER ERHÖHT: minmax von 340px auf 420px angehoben für deutlich breitere Karten */
        .app-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 2.5rem;
            max-width: 1500px;
            margin: 0 auto;
        }

        /* Mehr Platz und Abrundung für die Hauptkarte */
        .player-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.6);
        }

        .player-card h2 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }

        .player-card .club-tag {
            font-size: 1rem;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 1.25rem;
        }

        .player-card .divider {
            border-top: 2px solid var(--border-color);
            margin-bottom: 1.25rem;
        }

        /* Innerer Datenkasten mit mehr Luft */
        .inner-data-box {
            background-color: var(--card-inner-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 1.5rem;
        }

        .inner-title {
            color: var(--accent-orange);
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.6rem;
        }

        /* Ausgewogenes Spalten-Raster */
        .stats-grid {
            display: grid;
            grid-template-columns: 1.1fr 1fr; /* Links minimal mehr Platz gegeben */
            gap: 1.5rem;
        }

        /* Vertikale Trennlinie mit mehr Abstand */
        .stats-grid > div:first-child {
            padding-right: 1.5rem;
            border-right: 1px solid rgba(255, 255, 255, 0.15);
        }

        .stats-grid > div:last-child {
            padding-left: 0.5rem;
        }

        .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 0.4rem;
            white-space: nowrap; /* Verhindert das Umbrechen einzelner Wörter im Label */
        }

        /* Der originale AVG-Kasten aus der Vorlage */
        .value-avg-box {
            background-color: var(--accent-orange);
            border-radius: 6px;
            padding: 0.35rem 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            color: #000000; 
            display: inline-block;
            min-width: 95px;
            margin-bottom: 0.75rem;
        }

        .value-big {
            font-size: 1.7rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.75rem;
            line-height: 1;
        }

        .bilanz-gewonnen {
            color: var(--accent-green);
        }

        .bilanz-verloren {
            color: #ef4444;
        }

        /* Balken dicker und schöner gemacht */
        .progress-bg {
            background-color: rgba(255, 255, 255, 0.08);
            height: 8px;
            border-radius: 4px;
            margin-top: 0.5rem;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar {
            height: 100%;
            border-radius: 4px;
            width: 0%;
        }

        .progress-bar.green {
            background-color: var(--accent-green);
        }

        .progress-bar.blue {
            background-color: var(--accent-blue);
        }
    </style>
</head>
<body>

    <header>
        <h1>TV KAPELLEN 1919</h1>
        <p>Saison 2026/27 — Kader-Dashboard</p>
    </header>

    <div class="app-wrapper" id="app-wrapper">
        <p style="grid-column: 1/-1; text-align:center; color:#94a3b8;">Lade Live-Daten...</p>
    </div>

    <script src="script.js?v=1"></script>
</body>
</html>
