<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Kapellen 3 - Kader</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-orange: #ffb74d;
            --accent-green: #2e7d32;
            --accent-blue: #1565c0;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .app-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .player-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .player-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.5);
        }

        .player-card h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-orange);
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-card .status {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .stats-grid > div {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .value-avg-box {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--accent-orange);
        }

        .value-big {
            font-size: 1.4rem;
            font-weight: 700;
            padding: 0.25rem 0;
        }

        .bilanz-gewonnen {
            color: #4caf50;
        }

        .bilanz-verloren {
            color: #f44336;
        }

        .progress-bg {
            background-color: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 3px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .progress-bar.green {
            background-color: #4caf50;
        }

        .progress-bar.blue {
            background-color: #2196f3;
        }
    </style>
</head>
<body>

    <header>
        <h1>TV KAPELLEN 3</h1>
        <p>Saison-Kader & Leistungsdaten</p>
    </header>

    <div class="app-wrapper" id="app-wrapper">
        <p style="grid-column: 1/-1; text-align:center; color:#9ca3af;">Lade Spieldaten...</p>
    </div>

    <script src="script.js?v=1"></script>
</body>
</html>
