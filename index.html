<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Kapellen 1919 - Kader</title>
    <style>
        :root {
            --bg-dark: #0f172a; /* Dunkles Blau-Grau für den Hintergrund */
            --card-bg: #111827; /* Noch etwas dunkler für die Karten */
            --card-inner-bg: #151f32; /* Hintergrund für den inneren Kasten */
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-orange: #f59e0b;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--accent-green);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .app-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Die äußere Spielerkarte */
        .player-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .player-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.25rem;
        }

        .player-card .club-tag {
            font-size: 0.95rem;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .player-card .divider {
            border-top: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        /* Der innere Kasten für die Leistungsdaten */
        .inner-data-box {
            background-color: var(--card-inner-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .inner-title {
            color: var(--accent-orange);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
        }

        /* Das 2-Spalten-Raster im inneren Kasten */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            position: relative;
        }

        /* Die vertikale Trennlinie in der Mitte */
        .stats-grid > div:first-child {
            padding-right: 1rem;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-grid > div:last-child {
            padding-left: 1rem;
        }

        .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        /* Der markante AVG-Kasten aus dem Bild */
        .value-avg-box {
            background-color: var(--accent-orange);
            border-radius: 6px;
            padding: 0.25rem 0.5rem;
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            color: #000000; /* Schwarze Schrift auf Orange */
            display: inline-block;
            width: 100%;
            max-width: 90px;
            margin-bottom: 0.5rem;
        }

        .value-big {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .bilanz-gewonnen {
            color: var(--accent-green);
        }

        .bilanz-verloren {
            color: #ef4444;
        }

        .progress-bg {
            background-color: rgba(255, 255, 255, 0.1);
            height: 8px;
            border-radius: 4px;
            margin-top: 4px;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar {
            height: 100%;
            border-radius: 4px;
            width: 0%;
        }

        .progress-bar.green {
            background-color: var(--accent-green);
        }

        .progress-bar.blue {
            background-color: var(--accent-blue);
        }
    </style>
</head>
<body>

    <header>
        <h1>TV KAPELLEN 1919</h1>
        <p>Saison 2026/27 — Kader-Dashboard</p>
    </header>

    <div class="app-wrapper" id="app-wrapper">
        <p style="grid-column: 1/-1; text-align:center; color:#94a3b8;">Lade Live-Daten...</p>
    </div>

    <script src="script.js?v=1"></script>
</body>
</html>
